apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.service.name }}
  namespace: {{ .Values.namespace }}

spec:
  type: {{ .Values.frontend.service.type }}

  selector:
    app: {{ .Values.frontend.label }}

  ports:
    - protocol: TCP
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.port }}