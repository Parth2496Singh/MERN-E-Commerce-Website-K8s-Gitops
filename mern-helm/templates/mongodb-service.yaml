apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongodb.service.name }}
  namespace: {{ .Values.namespace }}

spec:
  clusterIP: {{ .Values.mongodb.service.clusterIP }}

  selector:
    app: {{ .Values.mongodb.label }}

  ports:
    - protocol: TCP
      port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.port }}